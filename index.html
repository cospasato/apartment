<!doctype html>
<html lang="en" style="height:100%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BNBMIS — BNB Management Information System</title>
    <meta name="description" content="Manage your hotel, lodge, BnB, apartment or guesthouse — bookings, staff and revenue all in one place."/>
    <meta name="theme-color" content="#6B1B2A"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="application-name" content="BNBMIS"/>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="BNBMIS"/>
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
      /* iOS full-screen fix */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #F5F5F5;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-text-size-adjust: 100%;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
        min-height: -webkit-fill-available;
        background: #F5F5F5;
      }
      /* Prevent rubber-band scroll on iOS for fixed containers */
      body.modal-open {
        overflow: hidden;
        position: fixed;
        width: 100%;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      button, input, select, textarea {
        -webkit-appearance: none;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
