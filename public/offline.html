<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BNBMIS — Offline</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#111;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .card{text-align:center;max-width:320px}
    .logo{width:80px;height:80px;background:#6B1B2A;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:22px;font-weight:900;color:#C9A84C;font-family:Georgia,serif;letter-spacing:-1px}
    h1{font-size:22px;margin-bottom:10px;color:#fff}
    p{color:#888;font-size:15px;line-height:1.6;margin-bottom:24px}
    button{background:#6B1B2A;color:#fff;border:none;border-radius:10px;padding:13px 28px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">BNBMIS</div>
    <h1>You're Offline</h1>
    <p>BNBMIS needs an internet connection to load your data. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
